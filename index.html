{<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat UI</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="h-screen bg-gray-100">
    <div class="h-full flex">
      <!-- Sidebar -->
      <aside class="w-72 bg-white border-r flex flex-col">
        <div class="p-4">
          <button
            class="w-full rounded-lg bg-blue-600 text-white py-2 font-medium hover:bg-blue-700"
            type="button"
          >
            + New Chat
          </button>
        </div>

        <div class="px-2 pb-4 space-y-1">
          <!-- Active conversation -->
          <div
            class="px-3 py-2 rounded-lg bg-blue-50 border border-blue-200 font-medium"
          >
            Chat with AI (active)
          </div>

          <!-- Another conversation -->
          <div class="px-3 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">
            Homework ideas
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="flex-1 flex flex-col">
        <!-- Messages (scrollable) -->
        <section class="flex-1 overflow-y-auto p-6 space-y-4">
          <!-- AI message (left) -->
          <div class="flex justify-start">
            <chat-message role="ai">
              Hey Elvin — I’m your AI assistant. What are we building today?
            </chat-message>
          </div>

          <!-- User message (right) -->
          <div class="flex justify-end">
            <chat-message role="user">
              I need a static chat UI with Tailwind for homework.
            </chat-message>
          </div>

          <!-- AI message (left) -->
          <div class="flex justify-start">
            <chat-message role="ai">
              Perfect. Sidebar on the left, messages scroll, input pinned at the
              bottom — and a custom element for messages.
            </chat-message>
          </div>
        </section>

        <!-- Input bar (pinned to bottom) -->
        <footer class="border-t bg-white p-4">
          <div class="flex gap-3">
            <textarea
              class="flex-1 resize-none rounded-lg border p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              rows="2"
              placeholder="Type a message..."
            ></textarea>

            <button
              class="rounded-lg bg-blue-600 text-white px-4 font-medium hover:bg-blue-700"
              type="button"
            >
              Send
            </button>
          </div>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
}
