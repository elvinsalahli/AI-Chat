<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-screen bg-gray-100">
    <div class="h-full flex">
      <aside class="w-72 bg-white border-r flex flex-col">
        <div class="p-4">
          <button
            class="w-full rounded-lg bg-blue-600 text-white py-2 font-medium"
            type="button"
          >
            + New Chat
          </button>
        </div>

        <div class="px-2 pb-4 space-y-1">
          <div
            class="px-3 py-2 rounded-lg bg-blue-50 border border-blue-200 font-medium"
          >
            Chat with AI
          </div>
          <div class="px-3 py-2 rounded-lg hover:bg-gray-100 cursor-pointer">
            Homework Ideas
          </div>
        </div>
      </aside>

      <main class="flex-1 flex flex-col">
        <section id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
          <!-- messages will be inserted here -->
        </section>

        <footer class="border-t bg-white p-4">
          <form id="chat-form" class="flex gap-3">
            <textarea
              id="message-input"
              class="flex-1 resize-none rounded-lg border p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
              rows="2"
              placeholder="Type a message..."
            ></textarea>

            <button
              id="send-button"
              class="rounded-lg bg-blue-600 text-white px-4 font-medium"
              type="submit"
            >
              Send
            </button>
          </form>
        </footer>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
